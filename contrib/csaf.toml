[document]
category = "csaf_security_advisory"
title = ""

[publisher]
# Required
category = "vendor" # Valid categories are: coordinator, discoverer, other, translator, user, vendor
name = "Vendor McVendorson"
namespace = "https://appthreat.com"
# Optional
contact_details = "vendor@mcvendorson.com"
issuing_authority = ""

# An entry for the data in this section will be added to the revision_history if the status is final
# The current date/time is default if not provided
# id is required and best set by the document issuing authority, but we will create one if not provided
[tracking]
# Required
current_release_date = ""   # Do not enclose dates if in valid datetime format
id = "Temp ID"
initial_release_date = ""
status = "draft"    # Valid statuses are: draft, final, interim
version = ""
# Optional
aliases = []

[revision_history]
# Include as many revision_history.revision entries as you like
[[revision_history.revision]]
date = "2022-09-22T20:54:06.186927"
number = "1"
summary = "Initial"

[[revision_history.revision]]
date = "2023-09-22T20:54:06.186927"
number = "2"
summary = "Update"

[notes]
# Category and text are required to add a note, add as many notes.note as you need
# Valid categories are: description, details, faq, general, legal_disclaimer, other, summary
[[notes.note]]
audience = "devs"
category = "general"
text = "la di da"
title = "note to devs"

[product_tree]
easy_import = "product_tree.json"

[distribution]
text = "Sample text"
# Label is required if tlp included
label = "AMBER"
url = "https://tlp.com"

[references]
# Summary and url are required, include as many references.ref as you like
# Category can be either "external" or "self"
[[references.ref]]
category = "self"
summary = "summary1"
url = "https://url.com"

[[references.ref]]
category = "external"
summary = "summary2"
url = "https://url.com"







